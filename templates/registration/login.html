<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión | TsDesk</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; }
    .login-card { border: none; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
    .brand-icon { font-size: 3rem; color: #ffc107; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
  <div class="col-11 col-sm-8 col-md-5 col-lg-4">
    <div class="card login-card">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <i class="bi bi-building-fill-gear brand-icon"></i>
          <h4 class="fw-bold mt-2">TsDesk</h4>
          <p class="text-muted small">Sistema de Gestión Contratista</p>
        </div>

        {% if form.errors %}
          <div class="alert alert-danger py-2">
            <i class="bi bi-exclamation-triangle me-2"></i>
            Usuario o contraseña incorrectos.
          </div>
        {% endif %}

        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Usuario</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" name="username" class="form-control form-control-lg" placeholder="Ingrese su usuario" autofocus required>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Contraseña</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" class="form-control form-control-lg" placeholder="Contraseña" required>
            </div>
          </div>
          <input type="hidden" name="next" value="{{ next }}">
          <button type="submit" class="btn btn-primary btn-lg w-100 fw-semibold">
            <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar al Sistema
          </button>
        </form>
      </div>
    </div>
    <p class="text-center text-white-50 small mt-3">
      Sistema de Gestión Operacional y Documental &copy; 2025
    </p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
