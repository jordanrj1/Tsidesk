{% extends 'base.html' %}
{% block title %}Editar Empresa | TsDesk{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="fw-bold mb-0"><i class="bi bi-building-fill text-primary me-2"></i>Editar Empresa</h2>
  <a href="{% url 'empresa_list' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Volver</a>
</div>
<div class="card border-0 shadow-sm">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="row g-3">
        {% for field in form %}
        <div class="col-md-6">
          <label class="form-label fw-semibold">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
        </div>
        {% endfor %}
      </div>
      <div class="mt-4 d-flex gap-2 justify-content-end">
        <a href="{% url 'empresa_list' %}" class="btn btn-outline-secondary">Cancelar</a>
        <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Guardar Cambios</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
